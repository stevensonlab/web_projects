<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-group { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input[type="range"] { width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .toggle-btn { display: flex; flex-direction: column; align-items: center; background: #f8f9fa; border: 1px solid #ddd; padding: 8px; border-radius: 6px; }
        .toggle-btn input { cursor: pointer; }
        button#masterPlay { width: 100%; padding: 15px; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; background: #28a745; color: white; margin-bottom: 20px; }
        button#masterPlay.playing { background: #dc3545; }
        .freq-display { font-family: monospace; color: #007bff; }
    </style>
</head>
<body>
    
    <div class="card">
    This site is designed as a remix of <a href="https://research.tue.nl/en/publications/auditory-demonstrations/"  target=_top>Auditory Demonstrations</a> (1987) by Houtsma, Rossing, and Wagemakers. Demos were initially coded with Gemini 3 Flash then edited and verified by the human <a href="https://stevenson.lab.uconn.edu" target=_top>Ian Stevenson</a>.

    <img src="../logo.png" width=100%>
    </div>

</body>
</html>
