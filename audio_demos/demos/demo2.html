<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Band - 100dB/oct FIR Filter</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .val { float: right; font-family: monospace; color: #007bff; }
        
        /* Toggle Styles */
        .toggle-row { display: flex; gap: 20px; margin-bottom: 20px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .toggle-item { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .toggle-item input { cursor: pointer; width: 18px; height: 18px; }

        button { 
            width: 100%; padding: 15px; font-size: 1.1rem; border: none; 
            border-radius: 8px; cursor: pointer; background: #007bff; 
            color: white; margin-bottom: 20px; font-weight: bold;
        }
        button.playing { background: #dc3545; }
        .val { float: right; color: #007bff; font-family: monospace; }
        .info { font-size: 0.8rem; color: #666; margin-top: 5px; font-style: italic; }


        canvas { width: 100%; height: 180px; background: #000; border-radius: 8px; margin-bottom: 20px; display: block; }
        .info { font-size: 0.85rem; line-height: 1.4; color: #666; background: #eee; padding: 15px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="card">
    <canvas id="visualizer"></canvas>
    
    <button id="playBtn">Start Audio</button>

    <div class="toggle-row">
        <label class="toggle-item">
            <input type="checkbox" id="toneToggle" checked> Tone Enable
        </label>
        <label class="toggle-item">
            <input type="checkbox" id="noiseToggle" checked> Noise Enable
        </label>
    </div>

    <div class="control-group">
        <label>Tone Frequency: <span class="val" id="freqDisp">2000</span> Hz</label>
        <input type="range" id="freq" min="500" max="4000" value="2000">
    </div>

    <div class="control-group">
        <label>Noise Bandwidth: <span class="val" id="bwDisp">100</span> Hz</label>
        <input type="range" id="bw" min="10" max="2000" value="100">
    </div>

    <div class="control-group">
        <label>Signal-to-Noise Ratio (SNR): <span class="val" id="snrDisp">0</span> dB</label>
        <input type="range" id="snr" min="-60" max="0" value="-30">
    </div>

    <div class="info">
        <strong>FIR Filter (511 Taps):</strong> 100 dB/octave slope.
        <br><br>
        <strong>Instructions:</strong> Use the checkboxes to isolate the noise or the tone. Notice how the tone becomes audible when the noise is turned off, even at low SNRs.
    </div>
</div>

<script>
    let audioCtx, toneOsc, noiseSource, convolver, toneGain, noiseGain, masterGain, analyser;
    let isPlaying = false;
    let pulseState = 0;

    const FIR_TAPS = 511; 
    
    const btn = document.getElementById('playBtn');
    const freqIn = document.getElementById('freq');
    const bwIn = document.getElementById('bw');
    const snrIn = document.getElementById('snr');
    const toneToggle = document.getElementById('toneToggle');
    const noiseToggle = document.getElementById('noiseToggle');
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 4096;
        analyser.smoothingTimeConstant = 0.4;

        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.6;
        masterGain.connect(analyser);
        analyser.connect(audioCtx.destination);

        // 1. Tone
        toneOsc = audioCtx.createOscillator();
        toneGain = audioCtx.createGain();
        toneGain.gain.value = 0;
        toneOsc.connect(toneGain).connect(masterGain);
        toneOsc.start();

        // 2. White Noise Source
        const bufferSize = 2 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        noiseSource.loop = true;

        // 3. FIR Filter
        convolver = audioCtx.createConvolver();
        noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.2;

        noiseSource.connect(convolver).connect(noiseGain).connect(masterGain);
        noiseSource.start();

        updateParams();
        pulse();
        draw();
    }

    function sinc(x) {
        if (x === 0) return 1;
        return Math.sin(Math.PI * x) / (Math.PI * x);
    }

    function updateParams() {
        if (!audioCtx) return;

        const f = parseFloat(freqIn.value);
        const bw = parseFloat(bwIn.value);
        const fs = audioCtx.sampleRate;

        // Update Tone Frequency
        toneOsc.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.05);

        // Update Noise Gain based on toggle
        noiseGain.gain.setTargetAtTime(noiseToggle.checked ? 0.2 : 0, audioCtx.currentTime, 0.05);

        // Calculate FIR Kernel
        const kernel = new Float32Array(FIR_TAPS);
        const M = (FIR_TAPS - 1) / 2;
        const fcLow = (f - bw / 2) / fs;
        const fcHigh = (f + bw / 2) / fs;

        for (let n = 0; n < FIR_TAPS; n++) {
            let val = (2 * fcHigh * sinc(2 * fcHigh * (n - M))) - (2 * fcLow * sinc(2 * fcLow * (n - M)));
            const window = 0.42 - 0.5 * Math.cos((2 * Math.PI * n) / (FIR_TAPS - 1)) + 0.08 * Math.cos((4 * Math.PI * n) / (FIR_TAPS - 1));
            kernel[n] = val * window;
        }

        const irBuffer = audioCtx.createBuffer(1, FIR_TAPS, fs);
        irBuffer.getChannelData(0).set(kernel);
        convolver.buffer = irBuffer;

        // UI
        document.getElementById('freqDisp').textContent = f;
        document.getElementById('bwDisp').textContent = bw;
        document.getElementById('snrDisp').textContent = parseFloat(snrIn.value);
    }

    function pulse() {
        setInterval(() => {
            if (!isPlaying || !audioCtx) return;
            
            const snr = parseFloat(snrIn.value);
            // Tone level relative to noise floor (0.2)
            const toneVol = 0.2 * Math.pow(10, snr / 20);

            // Pulse if enabled, otherwise stay silent
            if (pulseState % 2 === 0 && toneToggle.checked) {
                toneGain.gain.setTargetAtTime(toneVol, audioCtx.currentTime, 0.01);
            } else {
                toneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
            }
            pulseState++;
        }, 150);
    }

    function draw() {
        requestAnimationFrame(draw);
        if (!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);

        canvasCtx.fillStyle = '#000';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

        const maxFreqDisp = 6000;
        const binWidth = audioCtx.sampleRate / analyser.fftSize;
        const maxIdx = Math.floor(maxFreqDisp / binWidth);
        
        canvasCtx.beginPath();
        canvasCtx.strokeStyle = '#007bff';
        canvasCtx.lineWidth = 2;

        for (let i = 0; i < maxIdx; i++) {
            const x = (i / maxIdx) * canvas.width;
            const y = canvas.height - (dataArray[i] / 255) * canvas.height;
            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
        }
        canvasCtx.stroke();

        const targetX = (parseFloat(freqIn.value) / maxFreqDisp) * canvas.width;
        canvasCtx.strokeStyle = 'rgba(255,255,255,0.4)';
        canvasCtx.setLineDash([5, 5]);
        canvasCtx.strokeRect(targetX, 0, 1, canvas.height);
        canvasCtx.setLineDash([]);
    }

    btn.addEventListener('click', () => {
        if (!audioCtx) initAudio();
        if (isPlaying) {
            audioCtx.suspend();
            btn.textContent = "Start Audio";
        } else {
            audioCtx.resume();
            btn.textContent = "Stop Audio";
        }
        btn.classList.toggle('playing');
        isPlaying = !isPlaying;
    });

    [freqIn, bwIn, snrIn, toneToggle, noiseToggle].forEach(el => el.addEventListener('input', updateParams));
</script>
</body>
</html>
